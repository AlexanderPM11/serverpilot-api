version: '3.8'

services:
  api:
    build:
      context: .          # Root of Backend folder
      dockerfile: Dockerfile
    container_name: serverpilot-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5242}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

      # ── Admin credentials ──────────────────────────────────
      # Used ONLY on first startup when the database is empty.
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@serverpilot.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}

      # ── JWT secret ─────────────────────────────────────────
      - Jwt__Key=${JWT_SECRET:-SUPER_SECRET_KEY_FOR_SERVER_PILOT_STAGE_1}

      # ── Telegram / password reset URL (optional) ───────────
      - ClientUrl=${CLIENT_URL:-http://localhost}

    volumes:
      - serverpilot-db:/app/data   # Persistent SQLite database

volumes:
  serverpilot-db:
    driver: local
