version: '3.8'

services:

  # ── Backend: ASP.NET Core 8 API ─────────────────────────────────────────────
  api:
    build:
      context: .                             # Root of the repo (for multi-project build)
      dockerfile: ServerPilot.Api/Dockerfile
    container_name: serverpilot-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

      # ── Admin credentials ────────────────────────────
      # Override these to set your own initial login credentials.
      # They are ONLY used the very first time the app starts (when the DB is empty).
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@serverpilot.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}

      # ── JWT Secret ───────────────────────────────────
      # Change this to a strong random string in production!
      - Jwt__Key=${JWT_SECRET:-SUPER_SECRET_KEY_FOR_SERVER_PILOT_STAGE_1}

      # ── Telegram (optional) ──────────────────────────
      - ClientUrl=${CLIENT_URL:-http://localhost}

    volumes:
      - serverpilot-db:/app/data            # Persistent SQLite database
    expose:
      - "8080"                              # Only exposed internally to Nginx

  # ── Frontend: React PWA (Nginx) ─────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # The frontend in production uses relative /api paths,
        # so Nginx handles the proxy — no direct URL needed.
        VITE_API_URL: ""
    container_name: serverpilot-client
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"                    # Override PORT env var to change host port
    depends_on:
      - api

volumes:
  serverpilot-db:
    driver: local
